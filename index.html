<html>
<head>
  <title>Graduation Gift Registry</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      padding: 20px;
      background: #f7f7f7;
    }

    h1 {
      text-align: center;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      cursor: pointer;

      transition:
        transform 0.2s ease,
        box-shadow 0.2s ease;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    }

    .card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 10px;
    }

    .title {
      font-weight: bold;
      margin-top: 10px;
      font-size: 18px;
    }

    .desc {
      font-size: 14px;
      color: #555;
      margin-top: 8px;
    }

    .status {
      margin-top: 10px;
      font-size: 13px;
      color: green;
    }

    .hint {
      margin-top: 12px;
      text-align: center;
      color: #777;
      font-size: 13px;
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .card:hover .hint {
      opacity: 1;
    }
  </style>
</head>

<body>

<h1>🎓 Graduation Gift Registry</h1>

<div class="grid">

  <div class="card">
    <img src="https://placehold.co/300x200" />
    <div class="title">Hexclad Cookware</div>
    <div class="desc">Contribution to cookware set</div>
    <div class="status">1 slot available</div>
    <div class="hint">Click to reserve →</div>
  </div>

  <div class="card">
    <img src="https://placehold.co/300x200" />
    <div class="title">Black Dress Shoes</div>
    <div class="desc">Contribution to graduation outfit</div>
    <div class="status">1 slot available</div>
    <div class="hint">Click to reserve →</div>
  </div>

  <div class="card">
    <img src="https://placehold.co/300x200" />
    <div class="title">IKEA Gift Card</div>
    <div class="desc">Contribution to IKEA gift card</div>
    <div class="status">5 slots available</div>
    <div class="hint">Click to reserve →</div>
  </div>

</div>

</body>
</html>
