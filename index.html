<html>
<head>
  <title>Graduation Gift Registry</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      padding: 20px;
      background: #f7f7f7;
    }

    h1 {
      text-align: center;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 10px;
      background: #ddd;
    }

    .title {
      font-weight: bold;
      margin-top: 10px;
    }

    .desc {
      font-size: 14px;
      color: #555;
    }

    .status {
      margin-top: 10px;
      font-size: 13px;
      color: green;
    }
  </style>

</head>

<body>

<h1>🎓 Graduation Gift Registry</h1>

<div id="grid" class="grid"></div>

<script type="module">
  import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

  // 🔴 PUT YOUR VALUES HERE:
  const SUPABASE_URL = "https://szbcezcafzbdmdeqkobx.supabase.co";
  const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN6YmNlemNhZnpiZG1kZXFrb2J4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0NDQ0MzksImV4cCI6MjA5NzAyMDQzOX0.vtg5fAL7ZcvkbtPGukNOEW1ZF3e3dheO1ygT2-88y6o";

  const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

  async function loadGifts() {
    const { data, error } = await supabase
      .from("gifts")
      .select("*");

    if (error) {
      console.error(error);
      return;
    }

    const grid = document.getElementById("grid");
    grid.innerHTML = "";

    data.forEach(gift => {
      const remaining = gift.max_claims - gift.current_claims;

      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <img src="${gift.image_url || "https://via.placeholder.com/300x200"}" />
        <div class="title">${gift.name}</div>
        <div class="desc">${gift.description}</div>
        <div class="status">${remaining} slot(s) left</div>
	
	<button>Claim Gift</button>
      `;
	
	card.querySelector("button").addEventListener("click", () => {
  		alert("Button works!");
	});
	
      grid.appendChild(card);
    });
  }

  loadGifts();
</script>

</body>
</html>
